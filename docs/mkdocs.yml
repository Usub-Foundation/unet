site_name: unet Documentation
site_description: HTTP/1-focused documentation for the unet C++ networking library
site_url: https://usub-development.github.io/unet/
repo_url: https://github.com/Usub-development/unet/
repo_name: Usub-development/unet
edit_uri: edit/main/docs/

docs_dir: .
site_dir: ../site

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home:
      - Overview: index.md
      - Quick Start: quick-start.md
      - Installation: installation.md
      - Architecture: architecture.md
      - Configuration: config.md
      - Roadmap: roadmap.md
      - Contributing: contributing.md
  - HTTP:
      - Routing: routing.md
      - Writing Custom Routers: custom-router.md
      - Middlewares: middlewares.md
      - Request and Response: request-response.md
      - Handlers: handler.md
      - Client API: client.md
      - Multipart Form Data: multipart-form-data.md
      - Parsing: parsing.md
      - Experimental Parse Error Notes: Experimental/parse_error_handling.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Usub-development/unet/
      name: GitHub Repository

copyright: Copyright (c) 2026 Usub-development
